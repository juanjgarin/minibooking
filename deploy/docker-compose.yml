# Run from repo root: docker compose -f deploy/docker-compose.yml up --build
# Or from deploy/: docker compose up --build
#
# Web UI: http://localhost:8080 (static SPA; API URLs baked at image build time, see web.build.args)

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: minibooking-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong@Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 20s

  customer-service:
    build:
      context: ..
      dockerfile: src/services/CustomerService/CustomerService.Api/Dockerfile
    ports:
      - "5222:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      APPLY_MIGRATIONS_ON_STARTUP: "true"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=MiniBooking_CustomerDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Encrypt=false"

  booking-service:
    build:
      context: ..
      dockerfile: src/services/BookingService/BookingService.Api/Dockerfile
    ports:
      - "5221:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      customer-service:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      APPLY_MIGRATIONS_ON_STARTUP: "true"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=MiniBooking_BookingDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Encrypt=false"
      CustomerService__BaseUrl: "http://customer-service:8080"

  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
      args:
        # Browser calls these host ports (published below). Rebuild web if you change host ports.
        VITE_BOOKING_API_URL: http://localhost:5221
        VITE_CUSTOMER_API_URL: http://localhost:5222
    ports:
      - "8080:80"
    depends_on:
      booking-service:
        condition: service_started
      customer-service:
        condition: service_started

volumes:
  sqlserver_data:
